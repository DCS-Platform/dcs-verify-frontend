<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="theme-color" content="#0a0a0f">
<title>Page not found — DCS Verify</title>
<meta name="robots" content="noindex">
<link rel="icon" href="/brand/logo-mark-circle.png" type="image/png">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0a0a0f;--surface:#13131a;--border:#1f1f29;--text:#e8e8ec;--dim:#9c9ca8;--dimmer:#6a6a78;--accent:#1e7eff;--accent-2:#4aa3ff;--mono:"JetBrains Mono",monospace;--sans:"Inter",-apple-system,system-ui,sans-serif}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;text-align:center}
  .box{max-width:520px}
  .code{font-family:var(--mono);font-size:13px;letter-spacing:.2em;color:var(--accent-2);text-transform:uppercase;margin-bottom:16px}
  h1{font-size:30px;font-weight:800;letter-spacing:-.02em;margin-bottom:12px}
  p{color:var(--dim);font-size:15px;line-height:1.6;margin-bottom:24px}
  .btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
  a.btn{display:inline-flex;align-items:center;gap:8px;padding:12px 22px;border-radius:10px;font-weight:700;font-size:14px;text-decoration:none}
  a.primary{background:var(--accent);color:#fff}
  a.ghost{border:1px solid var(--border);color:var(--text)}
  .links{margin-top:24px;font-family:var(--mono);font-size:12.5px;color:var(--dimmer)}
  .links a{color:var(--accent-2);text-decoration:none;margin:0 7px}
  .note{font-family:var(--mono);font-size:11px;color:var(--dimmer);margin-top:22px}
</style>
</head>
<body>
  <div class="box">
    <div class="code">Error 404</div>
    <h1>Page not found</h1>
    <p>This page doesn't exist or has moved. If you're trying to check a receipt or a build, here's where to go:</p>
    <div class="btns">
      <a class="btn primary" href="/verify.html">Verify a receipt</a>
      <a class="btn ghost" href="/explorer.html">Open the Explorer</a>
    </div>
    <div class="links">
      <a href="/index.html">Home</a>·<a href="/registry.html">Registry</a>·<a href="/trust-landscape.html">Trust Landscape</a>·<a href="/privacy.html">Privacy</a>·<a href="/terms.html">Terms</a>
    </div>
    <p class="note">Reached this from a link on our site? That's a bug — let us know.</p>
  </div>
</body>
</html>
